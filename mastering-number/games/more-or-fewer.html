<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More or Fewer? – Mastering Number</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container { background: white; border-radius: 12px; padding: 28px; max-width: 560px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border-top: 5px solid #1798d3; }
        .school-header { text-align: center; margin-bottom: 8px; }
        .school-logo { max-width: 80px; height: auto; }
        .year-badge { text-align: center; background: #e8f4fa; color: #1798d3; padding: 3px 14px; border-radius: 20px; font-size: .85em; font-weight: bold; display: block; margin: 6px auto 12px; }
        h1 { text-align: center; color: #0a0101; font-size: 1.8em; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 18px; font-size: .95em; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn-primary { background: #1798d3; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: all .2s; width: 100%; margin-top: 10px; font-family: inherit; }
        .btn-primary:hover { background: #1280b3; }
        .btn-secondary { display: block; text-align: center; background: #0a0101; color: white; border: none; border-radius: 8px; padding: 11px; font-size: 1em; cursor: pointer; transition: all .2s; width: 100%; margin-top: 8px; text-decoration: none; font-family: inherit; }
        .btn-secondary:hover { background: #292929; }
        .btn-back { display: block; text-align: center; color: #1798d3; font-size: .9em; margin-top: 12px; text-decoration: none; }
        .settings-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0; font-size: 1em; color: #333; }
        .settings-row select { padding: 7px 12px; font-size: 1em; border-radius: 6px; border: 2px solid #ddd; background: white; font-family: inherit; }
        .settings-row select:focus { border-color: #1798d3; outline: none; }
        .progress-text { text-align: center; color: #666; margin-bottom: 5px; font-size: .9em; }
        .progress-bar { background: #eee; border-radius: 8px; height: 12px; margin-bottom: 14px; overflow: hidden; }
        .progress-fill { height: 100%; background: #1798d3; border-radius: 8px; transition: width .3s ease; }
        .score-display { text-align: center; color: #666; font-size: .95em; margin-bottom: 10px; }
        /* Groups display */
        .groups-row { display: flex; align-items: center; justify-content: space-around; margin: 12px 0; gap: 10px; }
        .group-box { flex: 1; background: #f8f8f8; border: 2px solid #eee; border-radius: 10px; padding: 12px; text-align: center; min-height: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
        .group-label { font-size: .85em; color: #999; margin-bottom: 4px; }
        .group-num { font-size: 3em; font-weight: bold; color: #1798d3; }
        .dot-cluster { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 130px; }
        .cluster-dot { width: 22px; height: 22px; border-radius: 50%; background: #1798d3; flex-shrink: 0; }
        .vs-label { font-size: 1.5em; color: #bbb; font-weight: bold; flex-shrink: 0; }
        /* Answer buttons */
        .question-label { text-align: center; font-size: 1.1em; color: #333; margin: 10px 0 8px; font-weight: bold; }
        .cmp-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .cmp-btn {
            flex: 1; min-width: 100px; padding: 14px 8px; font-size: 1em; font-weight: bold;
            border: 3px solid #ddd; border-radius: 8px; background: #f8f8f8;
            cursor: pointer; transition: all .15s; font-family: inherit;
            user-select: none; touch-action: manipulation;
        }
        .cmp-btn:hover { border-color: #1798d3; background: #e8f4fa; }
        .cmp-btn:active { background: #1798d3; color: white; transform: scale(.97); }
        .cmp-btn:disabled { opacity: .4; cursor: default; }
        .cmp-btn.correct-btn { background: #e8f4fa; border-color: #1798d3; color: #1798d3; }
        .cmp-btn.wrong-btn { background: #ffebee; border-color: #d32f2f; color: #d32f2f; }
        .feedback { text-align: center; font-size: 1.2em; font-weight: bold; min-height: 34px; margin: 10px 0; }
        .feedback.correct { color: #1798d3; }
        .feedback.wrong { color: #d32f2f; }
        /* Results */
        .results-header { text-align: center; margin-bottom: 18px; }
        .results-emoji { font-size: 3.5em; display: block; margin-bottom: 8px; }
        .results-score { font-size: 2.4em; font-weight: bold; color: #0a0101; display: block; }
        .results-pct { color: #666; font-size: 1em; }
        .results-msg { text-align: center; font-size: 1.15em; color: #555; margin: 12px 0 18px; }
        .summary-list { margin: 0 0 12px; max-height: 280px; overflow-y: auto; }
        .summary-item { padding: 7px 10px; border-radius: 6px; margin: 3px 0; display: flex; justify-content: space-between; font-size: .92em; }
        .s-correct { background: #e8f4fa; border-left: 4px solid #1798d3; }
        .s-wrong { background: #ffebee; border-left: 4px solid #d32f2f; }
        .s-correct .s-mark { color: #1798d3; font-weight: bold; }
        .s-wrong .s-mark { color: #d32f2f; font-weight: bold; }
        @media (max-width: 768px) { body { padding: 10px; } .container { padding: 20px; } }
        @media (max-width: 480px) {
            body { padding: 5px; align-items: flex-start; }
            .container { padding: 15px; border-radius: 8px; }
            h1 { font-size: 1.4em; }
            .cluster-dot { width: 18px; height: 18px; }
            .cmp-btn { font-size: .9em; padding: 12px 6px; }
            .settings-row select { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- SETUP -->
    <div id="setup-screen" class="screen active">
        <div class="school-header">
            <img src="https://wallscourtfarmacademy.clf.uk/wp-content/uploads/Wallscourt%20Farm%20logo%20cmyk%20big.jpg" alt="Wallscourt Farm Academy" class="school-logo">
        </div>
        <div class="year-badge" id="year-badge"></div>
        <h1>⚖️ More or Fewer?</h1>
        <p class="subtitle">Which group has more? Which has fewer? Or are they equal?</p>
        <div class="settings-row">
            <label for="q-count">Questions:</label>
            <select id="q-count">
                <option value="10" selected>10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
        </div>
        <button class="btn-primary" onclick="startGame()">Start!</button>
        <a class="btn-back" id="back-link" href="../index.html">← Back to games</a>
    </div>

    <!-- GAME -->
    <div id="game-screen" class="screen">
        <div class="school-header">
            <img src="https://wallscourtfarmacademy.clf.uk/wp-content/uploads/Wallscourt%20Farm%20logo%20cmyk%20big.jpg" alt="Wallscourt Farm Academy" class="school-logo">
        </div>
        <div class="progress-text" id="progress-text"></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="score-display" id="score-display"></div>
        <div class="groups-row" id="groups-row"></div>
        <p class="question-label" id="question-label"></p>
        <div class="cmp-btns" id="cmp-btns"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <!-- RESULTS -->
    <div id="results-screen" class="screen">
        <div class="school-header">
            <img src="https://wallscourtfarmacademy.clf.uk/wp-content/uploads/Wallscourt%20Farm%20logo%20cmyk%20big.jpg" alt="Wallscourt Farm Academy" class="school-logo">
        </div>
        <div class="results-header">
            <span class="results-emoji" id="r-emoji"></span>
            <span class="results-score" id="r-score"></span>
            <div class="results-pct" id="r-pct"></div>
        </div>
        <div class="results-msg" id="r-msg"></div>
        <div class="summary-list" id="r-summary"></div>
        <button class="btn-primary" onclick="startGame()">Try Again</button>
        <a class="btn-secondary" id="home-link" href="../index.html">← Back to games</a>
    </div>
</div>

<script>
    const YEAR = new URLSearchParams(window.location.search).get('year') || 'year1';
    const YEAR_LABELS = { reception: 'Level 1', year1: 'Level 2', year2: 'Level 3' };
    document.getElementById('year-badge').textContent = YEAR_LABELS[YEAR];
    document.getElementById('back-link').href = `../index.html?year=${YEAR}`;
    document.getElementById('home-link').href = `../index.html?year=${YEAR}`;

    const MAX_NUM = { reception: 5, year1: 9, year2: 10 }[YEAR];
    // For Y2, also include numeral-only comparisons up to 20
    const USE_NUMERALS_ABOVE = YEAR === 'year2' ? 10 : 999;

    let questions = [], currentQ = 0, score = 0, allAnswers = [];
    let canAnswer = false, advanceTimer = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateProgress() {
        const pct = (currentQ / questions.length) * 100;
        document.getElementById('progress-text').textContent = `Question ${currentQ + 1} of ${questions.length}`;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('score-display').textContent = `Score: ${score} / ${currentQ}`;
    }

    function generateQuestion() {
        const useNumerals = YEAR === 'year2' && Math.random() < 0.4;
        const max = useNumerals ? 20 : MAX_NUM;
        const a = 1 + Math.floor(Math.random() * max);
        let b;
        if (Math.random() < 0.2) {
            b = a; // equal ~20% of time
        } else {
            do { b = 1 + Math.floor(Math.random() * max); } while (b === a);
        }
        return { a, b, useNumerals };
    }

    function startGame() {
        const count = parseInt(document.getElementById('q-count').value);
        questions = [];
        for (let i = 0; i < count; i++) questions.push(generateQuestion());
        currentQ = 0; score = 0; allAnswers = [];
        showScreen('game-screen');
        showQuestion();
    }

    function renderGroup(n, useNumerals) {
        if (useNumerals) {
            return `<div class="group-num">${n}</div>`;
        }
        let dots = '';
        for (let i = 0; i < n; i++) dots += '<div class="cluster-dot"></div>';
        return `<div class="dot-cluster">${dots}</div>`;
    }

    function showQuestion() {
        if (currentQ >= questions.length) { showResults(); return; }
        if (advanceTimer) clearTimeout(advanceTimer);
        canAnswer = true;
        updateProgress();

        const q = questions[currentQ];
        const { a, b, useNumerals } = q;

        const row = document.getElementById('groups-row');
        row.innerHTML = `
            <div class="group-box">
                <div class="group-label">Left</div>
                ${renderGroup(a, useNumerals)}
            </div>
            <div class="vs-label">vs</div>
            <div class="group-box">
                <div class="group-label">Right</div>
                ${renderGroup(b, useNumerals)}
            </div>`;

        document.getElementById('question-label').textContent = useNumerals
            ? 'Which is true?'
            : 'Which side has more?';

        const fb = document.getElementById('feedback');
        fb.textContent = '';
        fb.className = 'feedback';

        // Determine correct answer
        let correctAnswer;
        if (a > b) correctAnswer = 'left';
        else if (b > a) correctAnswer = 'right';
        else correctAnswer = 'equal';

        // Build buttons
        const btnsEl = document.getElementById('cmp-btns');
        const labels = useNumerals
            ? [{ val: 'left', label: 'Left >' }, { val: 'equal', label: 'Left = Right' }, { val: 'right', label: 'Right >' }]
            : [{ val: 'left', label: '⬅ Left has more' }, { val: 'equal', label: '= Equal' }, { val: 'right', label: 'Right has more ➡' }];

        btnsEl.innerHTML = '';
        labels.forEach(({ val, label }) => {
            const btn = document.createElement('button');
            btn.className = 'cmp-btn';
            btn.textContent = label;
            btn.onclick = () => handleAnswer(val, correctAnswer, a, b, useNumerals);
            btnsEl.appendChild(btn);
        });
    }

    function handleAnswer(chosen, correct, a, b, useNumerals) {
        if (!canAnswer) return;
        canAnswer = false;
        document.querySelectorAll('.cmp-btn').forEach(btn => {
            btn.disabled = true;
            const labelMap = { left: '⬅ Left has more', equal: '= Equal', right: 'Right has more ➡' };
            const numLabelMap = { left: 'Left >', equal: 'Left = Right', right: 'Right >' };
            const map = useNumerals ? numLabelMap : labelMap;
            const v = Object.entries(map).find(([, l]) => btn.textContent === l)?.[0];
            if (v === correct) btn.classList.add('correct-btn');
            else if (v === chosen && chosen !== correct) btn.classList.add('wrong-btn');
        });

        const isCorrect = chosen === correct;
        const fb = document.getElementById('feedback');

        if (isCorrect) {
            score++;
            fb.textContent = '✓ Correct!';
            fb.className = 'feedback correct';
        } else {
            const answer = correct === 'left' ? `Left (${a}) has more` : correct === 'right' ? `Right (${b}) has more` : 'They\'re equal!';
            fb.textContent = `✗ ${answer}`;
            fb.className = 'feedback wrong';
        }

        allAnswers.push({ a, b, chosen, correct, isCorrect });
        currentQ++;
        updateProgress();
        advanceTimer = setTimeout(showQuestion, 2000);
    }

    function showResults() {
        const total = questions.length;
        const pct = Math.round((score / total) * 100);
        let emoji, msg;
        if (pct === 100) { emoji = '🌟'; msg = 'Perfect comparisons!'; }
        else if (pct >= 80) { emoji = '🎉'; msg = 'Brilliant! Nearly there!'; }
        else if (pct >= 60) { emoji = '👍'; msg = 'Good work! Keep going!'; }
        else { emoji = '📚'; msg = 'Keep practising!'; }

        document.getElementById('r-emoji').textContent = emoji;
        document.getElementById('r-score').textContent = `${score} / ${total}`;
        document.getElementById('r-pct').textContent = `${pct}% correct`;
        document.getElementById('r-msg').textContent = msg;

        let html = '';
        allAnswers.forEach((a, i) => {
            const cls = a.isCorrect ? 's-correct' : 's-wrong';
            const answer = a.correct === 'left' ? `Left (${a.a})` : a.correct === 'right' ? `Right (${a.b})` : 'Equal';
            html += `<div class="summary-item ${cls}">
                <span>${i + 1}. ${a.a} vs ${a.b}</span>
                <span class="s-mark">${a.isCorrect ? '✓' : `✗ → ${answer}`}</span>
            </div>`;
        });
        document.getElementById('r-summary').innerHTML = html;
        showScreen('results-screen');
    }
</script>
</body>
</html>
