<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make the Number – Mastering Number</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .container { background: white; border-radius: 12px; padding: 28px; max-width: 540px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.4); border-top: 5px solid #1798d3; }
        .school-header { text-align: center; margin-bottom: 8px; }
        .school-logo { max-width: 80px; height: auto; }
        .year-badge { text-align: center; background: #e8f4fa; color: #1798d3; padding: 3px 14px; border-radius: 20px; font-size: .85em; font-weight: bold; display: block; margin: 6px auto 12px; }
        h1 { text-align: center; color: #0a0101; font-size: 1.8em; margin-bottom: 4px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 18px; font-size: .95em; }
        .screen { display: none; }
        .screen.active { display: block; }
        .btn-primary { background: #1798d3; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 1.2em; font-weight: bold; cursor: pointer; transition: all .2s; width: 100%; margin-top: 10px; font-family: inherit; }
        .btn-primary:hover { background: #1280b3; }
        .btn-secondary { display: block; text-align: center; background: #0a0101; color: white; border: none; border-radius: 8px; padding: 11px; font-size: 1em; cursor: pointer; transition: all .2s; width: 100%; margin-top: 8px; text-decoration: none; font-family: inherit; }
        .btn-secondary:hover { background: #292929; }
        .btn-back { display: block; text-align: center; color: #1798d3; font-size: .9em; margin-top: 12px; text-decoration: none; }
        .settings-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0; font-size: 1em; color: #333; }
        .settings-row select { padding: 7px 12px; font-size: 1em; border-radius: 6px; border: 2px solid #ddd; background: white; font-family: inherit; }
        .settings-row select:focus { border-color: #1798d3; outline: none; }
        .progress-text { text-align: center; color: #666; margin-bottom: 5px; font-size: .9em; }
        .progress-bar { background: #eee; border-radius: 8px; height: 12px; margin-bottom: 14px; overflow: hidden; }
        .progress-fill { height: 100%; background: #1798d3; border-radius: 8px; transition: width .3s ease; }
        .score-display { text-align: center; color: #666; font-size: .95em; margin-bottom: 10px; }
        /* Target number */
        .target-label { text-align: center; font-size: 1.15em; color: #666; margin-bottom: 4px; }
        .target-number { text-align: center; font-size: 4em; font-weight: bold; color: #0a0101; margin-bottom: 6px; line-height: 1; }
        /* Frame */
        .frame-wrapper { margin: 12px auto; }
        .frame-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
        .frame-cell {
            width: 54px; height: 54px; border: 3px solid #ccc; border-radius: 8px;
            background: white; cursor: pointer; transition: all .15s; touch-action: manipulation;
        }
        .frame-cell:hover { border-color: #1798d3; background: #e8f4fa; }
        .frame-cell.filled { background: #1798d3; border-color: #1280b3; }
        .frame-cell.correct-cell { background: #43a047; border-color: #2e7d32; pointer-events: none; }
        .frame-cell.wrong-cell { background: #ef5350; border-color: #c62828; pointer-events: none; }
        .frame-cell.show-cell { background: #43a047; border-color: #2e7d32; pointer-events: none; }
        .filled-count { text-align: center; color: #888; font-size: .9em; margin: 4px 0; }
        .feedback { text-align: center; font-size: 1.2em; font-weight: bold; min-height: 34px; margin: 8px 0; }
        .feedback.correct { color: #1798d3; }
        .feedback.wrong { color: #d32f2f; }
        .btn-next { background: #0a0101; color: white; border: none; border-radius: 8px; padding: 13px; font-size: 1.1em; font-weight: bold; cursor: pointer; transition: all .2s; width: 100%; margin-top: 8px; font-family: inherit; display: none; }
        .btn-next:hover { background: #292929; }
        /* Results */
        .results-header { text-align: center; margin-bottom: 18px; }
        .results-emoji { font-size: 3.5em; display: block; margin-bottom: 8px; }
        .results-score { font-size: 2.4em; font-weight: bold; color: #0a0101; display: block; }
        .results-pct { color: #666; font-size: 1em; }
        .results-msg { text-align: center; font-size: 1.15em; color: #555; margin: 12px 0 18px; }
        .summary-list { margin: 0 0 12px; max-height: 280px; overflow-y: auto; }
        .summary-item { padding: 7px 10px; border-radius: 6px; margin: 3px 0; display: flex; justify-content: space-between; font-size: .92em; }
        .s-correct { background: #e8f4fa; border-left: 4px solid #1798d3; }
        .s-wrong { background: #ffebee; border-left: 4px solid #d32f2f; }
        .s-correct .s-mark { color: #1798d3; font-weight: bold; }
        .s-wrong .s-mark { color: #d32f2f; font-weight: bold; }
        @media (max-width: 768px) { body { padding: 10px; } .container { padding: 20px; } }
        @media (max-width: 480px) {
            body { padding: 5px; align-items: flex-start; }
            .container { padding: 15px; border-radius: 8px; }
            h1 { font-size: 1.4em; }
            .frame-cell { width: 46px; height: 46px; }
            .settings-row select { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- SETUP -->
    <div id="setup-screen" class="screen active">
        <div class="school-header">
            <img src="https://wallscourtfarmacademy.clf.uk/wp-content/uploads/Wallscourt%20Farm%20logo%20cmyk%20big.jpg" alt="Wallscourt Farm Academy" class="school-logo">
        </div>
        <div class="year-badge" id="year-badge"></div>
        <h1>🔲 Make the Number</h1>
        <p class="subtitle">Tap the squares to fill the frame and show the number!</p>
        <div class="settings-row">
            <label for="q-count">Questions:</label>
            <select id="q-count">
                <option value="10" selected>10</option>
                <option value="15">15</option>
                <option value="20">20</option>
            </select>
        </div>
        <button class="btn-primary" onclick="startGame()">Start!</button>
        <a class="btn-back" id="back-link" href="../index.html">← Back to games</a>
    </div>

    <!-- GAME -->
    <div id="game-screen" class="screen">
        <div class="school-header">
            <img src="https://wallscourtfarmacademy.clf.uk/wp-content/uploads/Wallscourt%20Farm%20logo%20cmyk%20big.jpg" alt="Wallscourt Farm Academy" class="school-logo">
        </div>
        <div class="progress-text" id="progress-text"></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="score-display" id="score-display"></div>
        <p class="target-label">Make this number:</p>
        <div class="target-number" id="target-num"></div>
        <div class="frame-wrapper" id="frame-wrapper"></div>
        <div class="filled-count" id="filled-count">0 filled</div>
        <div class="feedback" id="feedback"></div>
        <button class="btn-primary" id="btn-check" onclick="checkAnswer()">Check!</button>
        <button class="btn-next" id="btn-next" onclick="nextQ()">Next →</button>
    </div>

    <!-- RESULTS -->
    <div id="results-screen" class="screen">
        <div class="school-header">
            <img src="https://wallscourtfarmacademy.clf.uk/wp-content/uploads/Wallscourt%20Farm%20logo%20cmyk%20big.jpg" alt="Wallscourt Farm Academy" class="school-logo">
        </div>
        <div class="results-header">
            <span class="results-emoji" id="r-emoji"></span>
            <span class="results-score" id="r-score"></span>
            <div class="results-pct" id="r-pct"></div>
        </div>
        <div class="results-msg" id="r-msg"></div>
        <div class="summary-list" id="r-summary"></div>
        <button class="btn-primary" onclick="startGame()">Try Again</button>
        <a class="btn-secondary" id="home-link" href="../index.html">← Back to games</a>
    </div>
</div>

<script>
    const YEAR = new URLSearchParams(window.location.search).get('year') || 'year1';
    const YEAR_LABELS = { reception: 'Level 1', year1: 'Level 2', year2: 'Level 3' };
    document.getElementById('year-badge').textContent = YEAR_LABELS[YEAR];
    document.getElementById('back-link').href = `../index.html?year=${YEAR}`;
    document.getElementById('home-link').href = `../index.html?year=${YEAR}`;

    const FRAME_SIZE = YEAR === 'reception' ? 5 : 10;
    const MAX_N = YEAR === 'reception' ? 5 : 10;

    let questions = [], currentQ = 0, score = 0, allAnswers = [];
    let filledCells = new Set();
    let canAnswer = false, advanceTimer = null;

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function updateProgress() {
        const pct = (currentQ / questions.length) * 100;
        document.getElementById('progress-text').textContent = `Question ${currentQ + 1} of ${questions.length}`;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('score-display').textContent = `Score: ${score} / ${currentQ}`;
    }

    function startGame() {
        const count = parseInt(document.getElementById('q-count').value);
        questions = [];
        for (let i = 0; i < count; i++) questions.push(1 + Math.floor(Math.random() * MAX_N));
        currentQ = 0; score = 0; allAnswers = [];
        showScreen('game-screen');
        showQuestion();
    }

    function buildFrame() {
        const wrapper = document.getElementById('frame-wrapper');
        wrapper.innerHTML = '';
        filledCells = new Set();

        if (FRAME_SIZE === 5) {
            const row = document.createElement('div');
            row.className = 'frame-row';
            for (let i = 0; i < 5; i++) {
                row.appendChild(makeCell(i));
            }
            wrapper.appendChild(row);
        } else {
            for (let r = 0; r < 2; r++) {
                const row = document.createElement('div');
                row.className = 'frame-row';
                for (let c = 0; c < 5; c++) {
                    row.appendChild(makeCell(r * 5 + c));
                }
                wrapper.appendChild(row);
            }
        }
        updateFilledCount();
    }

    function makeCell(idx) {
        const cell = document.createElement('div');
        cell.className = 'frame-cell';
        cell.dataset.idx = idx;
        cell.addEventListener('click', () => toggleCell(idx));
        return cell;
    }

    function toggleCell(idx) {
        if (!canAnswer) return;
        const cell = document.querySelector(`.frame-cell[data-idx="${idx}"]`);
        if (filledCells.has(idx)) {
            filledCells.delete(idx);
            cell.classList.remove('filled');
        } else {
            filledCells.add(idx);
            cell.classList.add('filled');
        }
        updateFilledCount();
    }

    function updateFilledCount() {
        document.getElementById('filled-count').textContent = `${filledCells.size} filled`;
    }

    function showQuestion() {
        if (currentQ >= questions.length) { showResults(); return; }
        if (advanceTimer) clearTimeout(advanceTimer);
        canAnswer = true;
        updateProgress();
        document.getElementById('target-num').textContent = questions[currentQ];
        document.getElementById('feedback').textContent = '';
        document.getElementById('feedback').className = 'feedback';
        document.getElementById('btn-check').style.display = 'block';
        document.getElementById('btn-next').style.display = 'none';
        buildFrame();
    }

    function checkAnswer() {
        if (!canAnswer) return;
        canAnswer = false;

        const target = questions[currentQ];
        const filled = filledCells.size;
        const isCorrect = filled === target;
        const fb = document.getElementById('feedback');

        // Lock cells
        document.querySelectorAll('.frame-cell').forEach(c => c.style.pointerEvents = 'none');

        if (isCorrect) {
            document.querySelectorAll('.frame-cell.filled').forEach(c => {
                c.classList.remove('filled');
                c.classList.add('correct-cell');
            });
            fb.textContent = '✓ Correct!';
            fb.className = 'feedback correct';
            score++;
            allAnswers.push({ target, filled, isCorrect: true });
            currentQ++;
            updateProgress();
            document.getElementById('btn-check').style.display = 'none';
            advanceTimer = setTimeout(showQuestion, 1600);
        } else {
            // Show correct answer in green, wrong fills in red
            document.querySelectorAll('.frame-cell').forEach(c => {
                const i = parseInt(c.dataset.idx);
                c.classList.remove('filled');
                if (i < target) c.classList.add('show-cell');
                else if (filledCells.has(i)) c.classList.add('wrong-cell');
            });
            const diff = filled - target;
            fb.textContent = filled < target ? `Need ${target - filled} more — answer is ${target}` : `${diff} too many — answer is ${target}`;
            fb.className = 'feedback wrong';
            allAnswers.push({ target, filled, isCorrect: false });
            currentQ++;
            updateProgress();
            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-next').style.display = 'block';
        }
    }

    function nextQ() {
        showQuestion();
    }

    function showResults() {
        const total = questions.length;
        const pct = Math.round((score / total) * 100);
        let emoji, msg;
        if (pct === 100) { emoji = '🌟'; msg = 'Perfect! You know your frames!'; }
        else if (pct >= 80) { emoji = '🎉'; msg = 'Brilliant work!'; }
        else if (pct >= 60) { emoji = '👍'; msg = 'Good effort! Keep practising!'; }
        else { emoji = '📚'; msg = 'Keep going — you\'ll get it!'; }

        document.getElementById('r-emoji').textContent = emoji;
        document.getElementById('r-score').textContent = `${score} / ${total}`;
        document.getElementById('r-pct').textContent = `${pct}% correct`;
        document.getElementById('r-msg').textContent = msg;

        let html = '';
        allAnswers.forEach((a, i) => {
            const cls = a.isCorrect ? 's-correct' : 's-wrong';
            const mark = a.isCorrect ? '✓ First try!' : `✗ Filled ${a.filled}, needed ${a.target}`;
            html += `<div class="summary-item ${cls}">
                <span>${i + 1}. Make ${a.target}</span>
                <span class="s-mark">${mark}</span>
            </div>`;
        });
        document.getElementById('r-summary').innerHTML = html;
        showScreen('results-screen');
    }
</script>
</body>
</html>
