<!DOCTYPE html>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#E8DAEF;font-family:'Nunito',sans-serif;}

    /* Mobile sidebar toggle */
    .sidebar-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      padding: 12px 24px;
      background: #7B3F9E;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(123,63,158,0.5);
      font-family: 'Nunito', sans-serif;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      z-index: 90;
    }

    @media (max-width: 768px) {
      .sidebar-toggle { display: block; }
      .sidebar-overlay.visible { display: block; }

      .app-sidebar {
        position: fixed !important;
        top: 0; left: -300px;
        width: 280px !important;
        min-width: 280px !important;
        height: 100vh !important;
        z-index: 95;
        transition: left 0.3s ease;
        box-shadow: 4px 0 20px rgba(0,0,0,0.3);
      }
      .app-sidebar.open {
        left: 0;
      }
      .app-main {
        width: 100% !important;
        padding: 10px !important;
      }
    }

    @media (max-width: 480px) {
      .app-main {
        padding: 8px !important;
      }
    }
  </style>

    function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

    function WordCard({word,grapheme,seed}){
      const display=grapheme.replace("_e","\u2013e");
      return(
        <div style={{display:"flex",alignItems:"center",background:"#fff",border:"3.5px solid #1a1a1a",borderRadius:"8px",padding:"12px 14px",position:"relative",minHeight:"108px",gap:"6px"}}>
          <div style={{position:"absolute",top:"7px",left:"9px",background:"#7B3F9E",color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:"11px",padding:"2px 8px",borderRadius:"20px",letterSpacing:"0.5px"}}>{display}</div>
          <div style={{flex:1,fontFamily:"'Fredoka One',cursive",fontSize:"clamp(26px,4vw,48px)",color:"#1a1a1a",letterSpacing:"1px",paddingTop:"18px",paddingLeft:"4px",lineHeight:1.1}}>{word}</div>
          <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}><MonsterDisplay seed={seed}/></div>
        </div>
      );
    }

    function App(){
      const [selected,setSelected]=useState(new Set());
      const [count,setCount]=useState(8);
      const [cards,setCards]=useState([]);
      const [generated,setGenerated]=useState(false);
      const [openGroups,setOpenGroups]=useState(new Set(GRAPHEME_GROUPS.map(g=>g.label)));
      const [sidebarOpen,setSidebarOpen]=useState(false);

      const toggleGrapheme=useCallback(g=>{setSelected(prev=>{const n=new Set(prev);n.has(g)?n.delete(g):n.add(g);return n;});},[]);
      const toggleGroup=useCallback((group)=>{const gs=group.graphemes,allSel=gs.every(g=>selected.has(g));setSelected(prev=>{const n=new Set(prev);if(allSel)gs.forEach(g=>n.delete(g));else gs.forEach(g=>n.add(g));return n;});},[selected]);
      const toggleOpen=useCallback(label=>{setOpenGroups(prev=>{const n=new Set(prev);n.has(label)?n.delete(label):n.add(label);return n;});},[]);

      const generate=useCallback(()=>{
        if(selected.size===0)return;
        const pool=[];
        selected.forEach(g=>(WORD_BANK[g]||[]).forEach(w=>pool.push({word:w,grapheme:g})));
        const result=shuffle(pool).slice(0,count).map((item,i)=>({...item,seed:Math.floor(Math.random()*9999)+i}));
        setCards(result);setGenerated(true);setSidebarOpen(false);
      },[selected,count]);

      const totalSel=selected.size;

      return(
        <div style={{minHeight:"100vh",background:"#E8DAEF",fontFamily:"'Nunito',sans-serif",display:"flex",flexDirection:"column"}}>
          <div style={{background:"#7B3F9E",padding:"12px 20px",display:"flex",alignItems:"center",gap:"14px",boxShadow:"0 3px 10px rgba(0,0,0,0.25)"}}>
            <div style={{fontSize:"26px"}}>👾</div>
            <div style={{flex:1}}>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"clamp(14px,2.8vw,24px)",color:"#fff",lineHeight:1.1}}>Phonics Alien Word Generator</div>
              <div style={{color:"#D8B8F0",fontSize:"11px",marginTop:"2px",fontWeight:700}}>Phonics screening check practice · WFA</div>
            </div>
          </div>

          {sidebarOpen && <div className="sidebar-overlay visible" onClick={()=>setSidebarOpen(false)}/>}

          <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 58px)"}}>
            <div className={`app-sidebar${sidebarOpen?' open':''}`} style={{width:"272px",minWidth:"220px",background:"#fff",borderRight:"2px solid #C3A0D8",overflowY:"auto",padding:"10px 0",flexShrink:0}}>
              <div style={{padding:"8px 14px 10px",borderBottom:"1px solid #E8DAEF"}}>
                <div style={{fontWeight:900,fontSize:"12px",color:"#7B3F9E",letterSpacing:"0.5px",textTransform:"uppercase"}}>Select Graphemes</div>
                <div style={{color:"#aaa",fontSize:"11px",marginTop:"2px"}}>{totalSel} selected · {cards.length} words shown</div>
              </div>
              {GRAPHEME_GROUPS.map(group=>{
                const isOpen=openGroups.has(group.label),allSel=group.graphemes.every(g=>selected.has(g)),someSel=group.graphemes.some(g=>selected.has(g));
                return(
                  <div key={group.label} style={{borderBottom:"1px solid #EDE5F0"}}>
                    <div style={{display:"flex",alignItems:"center",padding:"8px 10px",cursor:"pointer",gap:"6px",background:isOpen?group.color:"transparent"}} onClick={()=>toggleOpen(group.label)}>
                      <span style={{fontSize:"10px",color:"#bbb",userSelect:"none",flexShrink:0}}>{isOpen?"▼":"▶"}</span>
                      <span style={{flex:1,fontWeight:800,fontSize:"11.5px",color:"#444",lineHeight:1.3}}>{group.label}</span>
                      <button onClick={e=>{e.stopPropagation();toggleGroup(group);}} style={{fontSize:"10px",padding:"2px 7px",border:`1.5px solid ${group.border}`,borderRadius:"20px",background:allSel?group.border:"transparent",color:allSel?"#fff":group.border,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif",flexShrink:0}}>
                        {allSel?"All \u2713":someSel?"Some":"All"}
                      </button>
                    </div>
                    {isOpen&&(
                      <div style={{display:"flex",flexWrap:"wrap",gap:"5px",padding:"6px 10px 10px",background:group.color+"99"}}>
                        {group.graphemes.map(g=>{const isSel=selected.has(g),disp=g.replace("_e","\u2013e");return(<button key={g} onClick={()=>toggleGrapheme(g)} style={{padding:"3px 10px",border:`2px solid ${isSel?group.border:"#ccc"}`,borderRadius:"20px",background:isSel?group.border:"#fff",color:isSel?"#fff":"#555",fontWeight:800,fontSize:"13px",cursor:"pointer",fontFamily:"'Fredoka One',cursive",letterSpacing:"0.5px"}}>{disp}</button>);})}
                      </div>
                    )}
                  </div>
                );
              })}
              <div style={{padding:"10px",display:"none"}} className="mobile-generate">
                <button onClick={generate} disabled={totalSel===0} style={{width:"100%",padding:"10px",border:"none",borderRadius:"20px",background:totalSel===0?"#ccc":"#7B3F9E",color:"#fff",fontWeight:800,fontSize:"14px",cursor:totalSel===0?"not-allowed":"pointer"}}>✨ Generate!</button>
              </div>
            </div>

            <div className="app-main" style={{flex:1,overflowY:"auto",padding:"14px"}}>
              <div style={{display:"flex",alignItems:"center",gap:"8px",background:"#fff",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",border:"2px solid #C3A0D8",flexWrap:"wrap"}}>
                <div style={{fontWeight:800,fontSize:"13px",color:"#7B3F9E"}}>Words:</div>
                {[4,6,8,10,12].map(n=>(<button key={n} onClick={()=>setCount(n)} style={{padding:"4px 13px",border:"2px solid #7B3F9E",borderRadius:"20px",background:count===n?"#7B3F9E":"#fff",color:count===n?"#fff":"#7B3F9E",fontWeight:800,fontSize:"14px",cursor:"pointer"}}>{n}</button>))}
                <div style={{flex:1}}/>
                {generated&&(<button onClick={generate} style={{padding:"6px 16px",border:"2px solid #7B3F9E",borderRadius:"20px",background:"#fff",color:"#7B3F9E",fontWeight:800,fontSize:"13px",cursor:"pointer"}}>🔀 New Set</button>)}
                <button onClick={generate} disabled={totalSel===0} style={{padding:"6px 20px",border:"none",borderRadius:"20px",background:totalSel===0?"#ccc":"#7B3F9E",color:"#fff",fontWeight:800,fontSize:"14px",cursor:totalSel===0?"not-allowed":"pointer",boxShadow:totalSel>0?"0 3px 8px rgba(123,63,158,0.4)":"none"}}>✨ Generate!</button>
              </div>

              {totalSel>0&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"12px",alignItems:"center"}}>
                  <span style={{fontSize:"12px",fontWeight:700,color:"#7B3F9E"}}>Practising:</span>
                  {[...selected].map(g=>(<span key={g} style={{background:"#7B3F9E",color:"#fff",fontFamily:"'Fredoka One',cursive",fontSize:"13px",padding:"2px 11px",borderRadius:"20px"}}>{g.replace("_e","\u2013e")}</span>))}
                </div>
              )}

              {cards.length>0?(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(290px,100%),1fr))",gap:"11px"}}>
                  {cards.map((card,i)=>(<WordCard key={`${card.word}-${card.seed}`} {...card}/>))}
                </div>
              ):(
                <div style={{border:"3px dashed #C3A0D8",borderRadius:"16px",padding:"clamp(24px,5vw,56px) 24px",textAlign:"center",background:"rgba(255,255,255,0.5)"}}>
                  <div style={{fontSize:"52px",marginBottom:"10px"}}>👾</div>
                  <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"clamp(16px,3vw,22px)",color:"#7B3F9E",marginBottom:"6px"}}>Ready to meet some aliens?</div>
                  <div style={{color:"#9B59B6",fontSize:"13px",fontWeight:600}}>Pick graphemes {window.innerWidth<=768?"using the button below":"from the panel on the left"}, then press Generate!</div>
                </div>
              )}

              {cards.length>0&&(
                <div style={{marginTop:"14px",background:"rgba(255,255,255,0.7)",border:"1.5px solid #C3A0D8",borderRadius:"8px",padding:"9px 13px",fontSize:"12px",color:"#7B3F9E",fontWeight:700,marginBottom:"60px"}}>
                  💡 These are all alien words — they are not real words! If one looks familiar, press "New Set" to swap it out.
                </div>
              )}
            </div>
          </div>

          <button className="sidebar-toggle" onClick={()=>setSidebarOpen(!sidebarOpen)}>
            {sidebarOpen ? "✕ Close" : `👾 Select Graphemes${totalSel>0?` (${totalSel})`:""}`}
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
