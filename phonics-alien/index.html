  return(
    <div style={{display:"flex",alignItems:"center",background:"#FFFBEB",border:"3.5px solid #1a1a1a",borderRadius:"8px",padding:"12px 14px",position:"relative",minHeight:"108px",gap:"6px"}}>
      <div style={{position:"absolute",top:"7px",left:"9px",background:"#D97706",color:"#fff",fontFamily:"'Nunito',sans-serif",fontWeight:800,fontSize:"11px",padding:"2px 8px",borderRadius:"20px",letterSpacing:"0.5px"}}>
        {"✓ "+display}
      </div>
      <div style={{flex:1,fontFamily:"'Fredoka One',cursive",fontSize:"clamp(26px,4vw,48px)",color:"#1a1a1a",letterSpacing:"1px",paddingTop:"18px",paddingLeft:"4px",lineHeight:1.1}}>{word}</div>
      <div style={{flexShrink:0,width:"90px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"52px",lineHeight:1}}>{"📖"}</div>
    </div>
  );
}
const MODE_OPTS=[
  {id:"alien",label:"👾 Alien only"},
  {id:"real",label:"✓ Real only"},
  {id:"mixed",label:"Mix"},
];
function App(){
  const [selected,setSelected]=useState(new Set());
  const [count,setCount]=useState(8);
  const [mode,setMode]=useState("alien");
  const [cards,setCards]=useState([]);
  const [generated,setGenerated]=useState(false);
  const [openGroups,setOpenGroups]=useState(new Set(GRAPHEME_GROUPS.map(g=>g.label)));
  const toggleGrapheme=useCallback(g=>{setSelected(prev=>{const n=new Set(prev);n.has(g)?n.delete(g):n.add(g);return n;});},[]);
  const toggleGroup=useCallback((group)=>{const gs=group.graphemes,allSel=gs.every(g=>selected.has(g));setSelected(prev=>{const n=new Set(prev);if(allSel)gs.forEach(g=>n.delete(g));else gs.forEach(g=>n.add(g));return n;});},[selected]);
  const toggleOpen=useCallback(label=>{setOpenGroups(prev=>{const n=new Set(prev);n.has(label)?n.delete(label):n.add(label);return n;});},[]);
  const generate=useCallback(()=>{
    if(selected.size===0)return;
    let result=[];
    if(mode==="alien"){
      const pool=[];
      selected.forEach(g=>(ALIEN_WORDS[g]||[]).forEach(w=>pool.push({word:w,grapheme:g,type:"alien"})));
      result=shuffle(pool).slice(0,count).map((item,i)=>({...item,seed:Math.floor(Math.random()*9999)+i}));
    } else if(mode==="real"){
      const pool=[];
      selected.forEach(g=>(REAL_WORDS[g]||[]).forEach(w=>pool.push({word:w,grapheme:g,type:"real"})));
      result=shuffle(pool).slice(0,count).map(item=>({...item,seed:0}));
    } else {
      const aPool=[],rPool=[];
      selected.forEach(g=>{
        (ALIEN_WORDS[g]||[]).forEach(w=>aPool.push({word:w,grapheme:g,type:"alien"}));
        (REAL_WORDS[g]||[]).forEach(w=>rPool.push({word:w,grapheme:g,type:"real"}));
      });
      const half=Math.floor(count/2);
      const alienPick=shuffle(aPool).slice(0,count-half).map((item,i)=>({...item,seed:Math.floor(Math.random()*9999)+i}));
      const realPick=shuffle(rPool).slice(0,half).map(item=>({...item,seed:0}));
      result=shuffle([...alienPick,...realPick]);
    }
    setCards(result);setGenerated(true);
  },[selected,count,mode]);
  const totalSel=selected.size;
  return(
    <div style={{minHeight:"100vh",background:"#E8DAEF",fontFamily:"'Nunito',sans-serif",display:"flex",flexDirection:"column"}}>
      <div style={{background:"#7B3F9E",padding:"12px 20px",display:"flex",alignItems:"center",gap:"14px",boxShadow:"0 3px 10px rgba(0,0,0,0.25)"}}>
        <div style={{fontSize:"26px"}}>{"👾"}</div>
        <div>
          <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"clamp(16px,2.8vw,24px)",color:"#fff",lineHeight:1.1}}>Phonics Word Generator</div>
          <div style={{color:"#D8B8F0",fontSize:"11px",marginTop:"2px",fontWeight:700}}>Screening check practice · WFA</div>
        </div>
      </div>
      <div style={{display:"flex",flex:1,overflow:"hidden",height:"calc(100vh - 58px)"}}>
        <div style={{width:"272px",minWidth:"220px",background:"#fff",borderRight:"2px solid #C3A0D8",overflowY:"auto",padding:"10px 0",flexShrink:0}}>
          <div style={{padding:"8px 14px 10px",borderBottom:"1px solid #E8DAEF"}}>
            <div style={{fontWeight:900,fontSize:"12px",color:"#7B3F9E",letterSpacing:"0.5px",textTransform:"uppercase"}}>Select Graphemes</div>
            <div style={{color:"#aaa",fontSize:"11px",marginTop:"2px"}}>{totalSel} selected · {cards.length} words shown</div>
          </div>
          {GRAPHEME_GROUPS.map(group=>{
            const isOpen=openGroups.has(group.label),allSel=group.graphemes.every(g=>selected.has(g)),someSel=group.graphemes.some(g=>selected.has(g));
            return(
              <div key={group.label} style={{borderBottom:"1px solid #EDE5F0"}}>
                <div style={{display:"flex",alignItems:"center",padding:"8px 10px",cursor:"pointer",gap:"6px",background:isOpen?group.color:"transparent"}} onClick={()=>toggleOpen(group.label)}>
                  <span style={{fontSize:"10px",color:"#bbb",userSelect:"none",flexShrink:0}}>{isOpen?"v":">"}</span>
                  <span style={{flex:1,fontWeight:800,fontSize:"11.5px",color:"#444",lineHeight:1.3}}>{group.label}</span>
                  <button onClick={e=>{e.stopPropagation();toggleGroup(group);}} style={{fontSize:"10px",padding:"2px 7px",border:"1.5px solid "+group.border,borderRadius:"20px",background:allSel?group.border:"transparent",color:allSel?"#fff":group.border,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Nunito',sans-serif",flexShrink:0}}>
                    {allSel?"All ✓":someSel?"Some":"All"}
                  </button>
                </div>
                {isOpen&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:"5px",padding:"6px 10px 10px",background:group.color+"99"}}>
                    {group.graphemes.map(g=>{const isSel=selected.has(g),disp=g.replace("_e","-e");return(<button key={g} onClick={()=>toggleGrapheme(g)} style={{padding:"3px 10px",border:"2px solid "+(isSel?group.border:"#ccc"),borderRadius:"20px",background:isSel?group.border:"#fff",color:isSel?"#fff":"#555",fontWeight:800,fontSize:"13px",cursor:"pointer",fontFamily:"'Fredoka One',cursive",letterSpacing:"0.5px"}}>{disp}</button>);})}
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",background:"#fff",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",border:"2px solid #C3A0D8",flexWrap:"wrap",rowGap:"8px"}}>
            <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
              {MODE_OPTS.map(m=>(<button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"4px 12px",border:"2px solid "+(mode===m.id?"#1a1a1a":"#ccc"),borderRadius:"20px",background:mode===m.id?"#1a1a1a":"#fff",color:mode===m.id?"#fff":"#555",fontWeight:800,fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"}}>{m.label}</button>))}
            </div>
            <div style={{width:"1px",height:"28px",background:"#E8DAEF",margin:"0 4px",flexShrink:0}}/>
            <div style={{fontWeight:800,fontSize:"13px",color:"#7B3F9E",whiteSpace:"nowrap"}}>Words:</div>
            {[4,6,8,10,12].map(n=>(<button key={n} onClick={()=>setCount(n)} style={{padding:"4px 12px",border:"2px solid #7B3F9E",borderRadius:"20px",background:count===n?"#7B3F9E":"#fff",color:count===n?"#fff":"#7B3F9E",fontWeight:800,fontSize:"14px",cursor:"pointer"}}>{n}</button>))}
            <div style={{flex:1}}/>
            {generated&&(<button onClick={generate} style={{padding:"6px 16px",border:"2px solid #7B3F9E",borderRadius:"20px",background:"#fff",color:"#7B3F9E",fontWeight:800,fontSize:"13px",cursor:"pointer",whiteSpace:"nowrap"}}>🔀 New Set</button>)}
            <button onClick={generate} disabled={totalSel===0} style={{padding:"6px 20px",border:"none",borderRadius:"20px",background:totalSel===0?"#ccc":"#7B3F9E",color:"#fff",fontWeight:800,fontSize:"14px",cursor:totalSel===0?"not-allowed":"pointer",boxShadow:totalSel>0?"0 3px 8px rgba(123,63,158,0.4)":"none",whiteSpace:"nowrap"}}>✨ Generate!</button>
          </div>
          {generated&&cards.length>0&&mode==="mixed"&&(
            <div style={{display:"flex",gap:"12px",marginBottom:"10px",flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:"6px",background:"#fff",border:"2px solid #7B3F9E",borderRadius:"20px",padding:"3px 12px",fontSize:"12px",fontWeight:700,color:"#7B3F9E"}}>{"👾 Alien word"}</div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",background:"#FFFBEB",border:"2px solid #D97706",borderRadius:"20px",padding:"3px 12px",fontSize:"12px",fontWeight:700,color:"#D97706"}}>{"✓ Real word"}</div>
            </div>
          )}
          {cards.length>0?(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:"11px"}}>
              {cards.map((card,i)=>card.type==="real"?<RealCard key={card.word+i} {...card}/>:<AlienCard key={card.word+card.seed} {...card}/>)}
            </div>
          ):(
            <div style={{border:"3px dashed #C3A0D8",borderRadius:"16px",padding:"56px 24px",textAlign:"center",background:"rgba(255,255,255,0.5)"}}>
              <div style={{fontSize:"52px",marginBottom:"10px"}}>{"👾"}</div>
              <div style={{fontFamily:"'Fredoka One',cursive",fontSize:"22px",color:"#7B3F9E",marginBottom:"6px"}}>Ready to practise?</div>
              <div style={{color:"#9B59B6",fontSize:"13px",fontWeight:600}}>Pick graphemes from the left panel, choose your word type, then press Generate!</div>
            </div>
          )}
          {cards.length>0&&(
            <div style={{marginTop:"14px",background:"rgba(255,255,255,0.7)",border:"1.5px solid #C3A0D8",borderRadius:"8px",padding:"9px 13px",fontSize:"12px",color:"#7B3F9E",fontWeight:700}}>
              {"👾 Alien words have a monster badge · ✓ Real words have an amber badge · Press New Set for a fresh selection"}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
